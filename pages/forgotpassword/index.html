<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu</title>
    <link rel="stylesheet" href="../forgotpassword/style.css">
</head>
<body>

<div class="container">
    <h2>Quên mật khẩu</h2>

    <form id="forgotForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Nhập email của bạn" required>
        </div>

        <button type="submit">Gửi yêu cầu</button>
    </form>

    <p class="login-link">
        <a href="../Login/index.html">Quay lại đăng nhập</a>
    </p>
</div>

</body>
</html>

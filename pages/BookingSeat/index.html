<!DOCTYPE html>
<html lang="vi">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đặt ghế xem phim tại Cinestar - Chọn ghế yêu thích và đặt vé nhanh chóng">
    <title>Đặt Ghế Xem Phim - Cinestar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- ============ HEADER ============ -->
    <header class="header">
        <div class="header-container">
            <a href="./index.html" class="header-logo" style="text-decoration: none;">DATPHIM</a>
            <div class="header-search">
                <input type="text" placeholder="Tìm kiếm phim, rạp...">
                <button type="submit" class="search-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            <nav class="header-nav">
                <a href="./Movies/index.html" class="nav-link active">Phim</a>
                <a href="#" class="nav-link">Rạp</a>
                <a href="#" class="nav-link">Ưu đãi</a>
            </nav>
            <div class="header-actions">
                <button class="bell-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </button>
                <a href="./AccountManage/index.html" class="login-btn" style="text-decoration: none;">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Đăng nhập
                </a>
            </div>
        </div>
    </header>

    <!-- ============ PROGRESS STEPS ============ -->
    <section class="progress-bar-section" id="progress-section">
        <div class="progress-container">
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="steps">
                <div class="step active" id="step-1">
                    <div class="step-circle">1</div>
                    <span class="step-label">Chọn Ghế</span>
                </div>
                <div class="step" id="step-2">
                    <div class="step-circle">2</div>
                    <span class="step-label">Bắp & Nước</span>
                </div>
                <div class="step" id="step-3">
                    <div class="step-circle">3</div>
                    <span class="step-label">Thanh Toán</span>
                </div>
                <div class="step" id="step-4">
                    <div class="step-circle">4</div>
                    <span class="step-label">Xác Nhận</span>
                </div>
            </div>
        </div>
    </section>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="booking-main" id="booking-main">

        <!-- ---- LEFT: Seat Map Area ---- -->
        <section class="seat-section" id="seat-section">

            <!-- Movie & Showtime Quick Info -->
            <div class="showtime-info" id="showtime-info">
                <div class="showtime-movie">
                    <h1 id="movie-title">Tên Phim</h1>
                </div>
            </div>

            <!-- Thông Tin Ghế Ngồi -->
            <div class="seat-info-box" id="seat-info-box">
                <h2 class="box-title">Thông Tin Ghế Ngồi</h2>
                <div class="seat-info-content">
                </div>
            </div>

            <!-- Giá Vé -->
            <div class="price-box" id="price-box">
                <h2 class="box-title">Giá Vé</h2>
                <div class="price-content">
                </div>
            </div>
        </section>
        <!-- ---- RIGHT: Order Summary Sidebar ---- -->
        <aside class="order-summary" id="order-summary">
            <div class="summary-card">
                <h2 class="summary-title">Thông Tin Đặt Vé</h2>
            </div>
        </aside>
    </main>

    <!-- ============ FOOTER ============ -->
    <footer id="main-footer">
        <div class="footer-inner">
            <p>&copy; 2026 Cinestar. All rights reserved.</p>
        </div>
    </footer>

</body>

</html>

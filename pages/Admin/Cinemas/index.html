<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quản lý rạp phim</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../../assets/css/admin.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >
</head>
<body>

<div class="admin-layout">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="sidebar-logo">
            <h2>CineAdmin</h2>
        </div>

        <ul class="sidebar-menu">

            <li>
                <a href="../Dashboard/index.html">
                    <i class="fa-solid fa-chart-line"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="../Movies/index.html">
                    <i class="fa-solid fa-film"></i>
                    Quản lý phim
                </a>
            </li>

            <li>
                <a href="../Showtimes/index.html">
                    <i class="fa-solid fa-calendar-days"></i>
                    Suất chiếu
                </a>
            </li>

            <li>
                <a href="../Cinemas/index.html" class="active">
                    <i class="fa-solid fa-building"></i>
                    Rạp phim
                </a>
            </li>

            <li>
                <a href="../FoodDrink/index.html">
                    <i class="fa-solid fa-burger"></i>
                    Bắp nước
                </a>
            </li>

            <li>
                <a href="../Users/index.html">
                    <i class="fa-solid fa-users"></i>
                    Người dùng
                </a>
            </li>

        </ul>

    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Topbar -->
        <div class="topbar">

            <div class="topbar-title">
                <h1>Quản lý rạp phim</h1>
            </div>

            <a href="#" class="btn-add">
                <i class="fa-solid fa-plus"></i>
                Thêm rạp phim
            </a>

        </div>

        <!-- Table -->
        <div class="table-section">

            <table>

                <thead>

                    <tr>
                        <th>Tên rạp</th>
                        <th>Địa chỉ</th>
                        <th>Số phòng</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>Cinestar Huế</td>

                        <td>25 Hai Bà Trưng, Huế</td>

                        <td>6 phòng</td>

                        <td>
                            <span class="status showing">
                                Hoạt động
                            </span>
                        </td>

                        <td>

                            <div class="action-buttons">

                                <button class="btn-edit">
                                    <i class="fa-solid fa-pen"></i>
                                </button>

                                <button class="btn-delete">
                                    <i class="fa-solid fa-trash"></i>
                                </button>

                            </div>

                        </td>

                    </tr>

                    <tr>

                        <td>Cinestar Đà Nẵng</td>

                        <td>Lê Duẩn, Đà Nẵng</td>

                        <td>8 phòng</td>

                        <td>
                            <span class="status upcoming">
                                Bảo trì
                            </span>
                        </td>

                        <td>

                            <div class="action-buttons">

                                <button class="btn-edit">
                                    <i class="fa-solid fa-pen"></i>
                                </button>

                                <button class="btn-delete">
                                    <i class="fa-solid fa-trash"></i>
                                </button>

                            </div>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </main>

</div>

</body>
</html>

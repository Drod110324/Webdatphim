<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách phim - Cinestar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../HomePage/style.css">
</head>

<body>
    <header class="header">
        <div class="header-container">
            <a href="../HomePage/index.html" class="header-logo" style="text-decoration: none;">DATPHIM</a>
            <div class="header-search">
                <input type="text" placeholder="Tìm kiếm phim, rạp...">
                <button type="submit" class="search-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            <nav class="header-nav">
                <a href="../Movies/index.html" class="nav-link active">Phim</a>
                <a href="../Cinema/index.html" class="nav-link">Rạp</a>
                <a href="../Promotion/index.html" class="nav-link">Ưu đãi</a>
            </nav>
            <div class="header-actions">
                <button class="bell-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </button>
                <a href="../Login/index.html" class="login-btn" style="text-decoration: none;">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Đăng nhập
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="movie-tabs">
            <button class="tab-btn active" data-target="now-showing">Đang chiếu</button>
            <button class="tab-btn" data-target="coming-soon">Sắp chiếu</button>
            <button class="tab-btn" data-target="early-screening">Suất chiếu sớm</button>
        </div>
    <div class="movie-grid">
            <div class="movie-card">
                <a href="../MovieDetail/index.html" style="text-decoration: none;">
                    <span>card phim</span>
                </a>
            </div>
        </div>

    </main>

    <script>
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {

                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));

                btn.classList.add('active');
                const targetId = btn.getAttribute('data-target');
                document.getElementById(targetId).classList.add('active');
            });
        });
    </script>
</body>

</html>

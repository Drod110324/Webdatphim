<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách phim - Cinestar</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="header-placeholder"></div>
    <main>
        <div class="movie-filters">
            <div class="filters-container">
                <div class="filter-item">
                    <select id="filter-category">
                        <option value="">Tất cả thể loại</option>
                    </select>
                </div>
                <div class="filter-item">
                    <select id="filter-time">
                        <option value="">Giờ chiếu</option>
                    </select>
                </div>
                <div class="filter-item">
                    <select id="filter-age">
                        <option value="">Độ tuổi</option>
                    </select>
                </div>
                <button class="btn-filter-apply">LỌC PHIM</button>
            </div>
        </div>

        <div class="movie-tabs">
            <button class="tab-btn active" data-target="now-showing">Đang chiếu</button>
            <button class="tab-btn" data-target="coming-soon">Sắp chiếu</button>
            <button class="tab-btn" data-target="early-screening">Suất chiếu sớm</button>
        </div>
        <div id="now-showing" class="tab-content active">
            <div class="movie-grid">
            </div>
        </div>

        <div id="coming-soon" class="tab-content">
            <div class="movie-grid">
            </div>
        </div>

        <div id="early-screening" class="tab-content">
            <div class="movie-grid">
            </div>
        </div>
    </main>
    <script src="index.js"></script>
    <div id="footer-placeholder"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/main.js"></script>
</body>

</html>

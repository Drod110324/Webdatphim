<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết phim - WebDatPhim</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../HomePage/style.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="main-content">
        <section class="movie-banner">
            <div class="banner-overlay"></div>
            <div class="container movie-info-wrapper">
                <div class="movie-poster">
                    <img src="https://via.placeholder.com/300x450" alt="Poster phim">
                </div>
                <div class="movie-details">
                    <h1 class="movie-title">Tên Phim </h1>
                    <div class="movie-meta">
                        <span class="genre">Thể loại</span>
                        <span class="duration">120 phút</span>

                    </div>
                    <p class="description">
                        Chi tiết phim
                    </p>
                    <div class="action-btns">
                        <a href="../BookingSeat/index.html" style="text-decoration: none;">
                            <button class="btn btn-primary">Đặt Vé Ngay</button>
                        </a>
                        <button class="btn btn-outline">Xem Trailer</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/main.js"></script>

</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Đăng ký tài khoản</h2>

  <form>
    <label>Họ và tên:</label><br>
    <input type="text" placeholder="Nhập họ và tên"><br><br>

    <label>Ngày sinh:</label><br>
    <input type="date"><br><br>

    <label>Số điện thoại:</label><br>
    <input type="tel" placeholder="Nhập số điện thoại"><br><br>

    <label>Tên đăng nhập:</label><br>
    <input type="text" placeholder="Nhập tên đăng nhập"><br><br>

    <label>CCCD/CMND:</label><br>
    <input type="text" placeholder="Nhập CCCD/CMND"><br><br>

    <label>Email:</label><br>
    <input type="email" placeholder="Nhập email"><br><br>

    <label>Mật khẩu:</label><br>
    <input type="password" placeholder="Nhập mật khẩu"><br><br>

    <label>Xác nhận mật khẩu:</label><br>
    <input type="password" placeholder="Nhập lại mật khẩu"><br><br>

    <input type="checkbox" id="agree">
    <label for="agree">Tôi đã đồng ý các điều khoản, điều kiện của thành viên Cinestar</label><br><br>

    <button type="submit">Đăng ký</button>
  </form>

  <p>Bạn đã có tài khoản? <a href="../Login/index.html">Đăng nhập</a></p>
</body>
</html

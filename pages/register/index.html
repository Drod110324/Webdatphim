<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Đăng ký tài khoản</h2>

  <form id="registerForm">

    <div class="form-group">
      <label for="fullname">Họ và tên</label>
      <input id="fullname" type="text" placeholder="Nhập họ và tên" required>
    </div>

    <div class="form-group">
      <label for="dob">Ngày sinh</label>
      <input id="dob" type="date" required>
    </div>

    <div class="form-group">
      <label for="phone">Số điện thoại</label>
      <input id="phone" type="tel" placeholder="Nhập số điện thoại" required>
    </div>

    <div class="form-group">
      <label for="username">Tên đăng nhập</label>
      <input id="username" type="text" placeholder="Nhập tên đăng nhập" required>
    </div>

    <div class="form-group">
      <label for="cccd">CCCD/CMND</label>
      <input id="cccd" type="text" placeholder="Nhập CCCD/CMND">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="Nhập email" required>
    </div>

    <div class="form-group">
      <label for="password">Mật khẩu</label>
      <input id="password" type="password" placeholder="Nhập mật khẩu" required>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Xác nhận mật khẩu</label>
      <input id="confirmPassword" type="password" placeholder="Nhập lại mật khẩu" required>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="agree" required>
      <label for="agree">Tôi đồng ý điều khoản Cinestar</label>
    </div>

    <button type="submit">Đăng ký</button>
  </form>

  <p class="login-link">
    Bạn đã có tài khoản? 
    <a href="../Login/index.html">Đăng nhập</a>
  </p>
</div>

</body>
